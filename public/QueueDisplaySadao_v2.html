<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Queue System Multi-PC</title>
<style>
:root { --bg: #0a1422; --panel: #0b1d34; --border: rgba(255,255,255,.14); --purple: #6a4bd1; --ok: #22c08a; --warn: #ffcf33; --blue: #2a64b6; --ink: #eef5ff; --car:#1e88e5; --Motorcycle:#43a047; --tta:#fb8c00; }
* { box-sizing: border-box; }
body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: var(--bg); color: var(--ink); }
header { display: flex; gap: 10px; align-items: center; justify-content: space-between; background: var(--purple); padding: 10px 12px; flex-wrap: wrap; }
header h1 { margin: 0; font-size: 20px; }
.mode-select { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.chip { background: rgba(0, 0, 0, 0.25); border: 1px solid rgba(255, 255, 255, 0.25); padding: 6px 10px; border-radius: 10px; color: #fff; cursor: pointer; user-select: none; display: inline-flex; align-items: center; gap: 6px; font-weight: 600; }
.active { background: #fff; color: #3a318a; border-color: #fff; }
.chip.car.active { background: var(--car); color: #fff; border-color: var(--car); }
.chip.Motorcycle.active { background: var(--Motorcycle); color: #fff; border-color: var(--Motorcycle); }
.chip.tta.active { background: var(--tta); color: #fff; border-color: var(--tta); }
.dot { width: 8px; height: 8px; border-radius: 999px; display: inline-block; background: rgb(170, 170, 170); }
.dot.on { background: rgb(34, 192, 138); }
main { max-width: 1100px; margin: 16px auto; padding: 0 12px; display: grid; gap: 14px; }
.panel { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
.row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
input, button, select { border-radius: 10px; border: 1px solid var(--border); background: rgb(7, 20, 40); color: var(--ink); padding: 9px 12px; font-size: 14px; }
button { cursor: pointer; border: 0; }
.grid9 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; } /* ปรับเป็น 3 คอลัมน์สำหรับ 9 ช่อง */
.cbtn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; background: var(--blue); box-shadow: rgba(0, 0, 0, 0.35) 0 4px 12px; border-radius: 12px; padding: 18px; color: #fff; }
.cbtn.num { font-size: 22px; font-weight: 700; }
.cbtn.plate { font-size: 14px; opacity: 0.85; font-weight: normal; background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 4px; margin: 2px 0; }
.cbtn.label { opacity: 0.95; border-top: 1px solid rgba(255,255,255,0.15); width: 100%; text-align: center; padding-top: 4px; margin-top: 2px; }
.stat { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.tile { background: rgb(8, 26, 48); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
.tiny { opacity: 0.85; font-size: 12px; }
.big { font-weight: 800; font-size: 38px; }
.display-wrap { max-width: 1400px; }
.display-top { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; }
.display-now { background: rgb(13, 35, 64); border: 1px solid var(--border); border-radius: 16px; padding: 18px; text-align: center; }
.display-ticket { font-size: 96px; font-weight: 900; line-height: 1; margin: 8px 0; }
.display-plate { font-size: 54px; font-weight: 700; color: #ffcf33; }
.recent-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; } /* ปรับเป็น 3 แถว */
.card { background: rgb(11, 29, 52); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
#voiceUnlock { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
</style>
<script src="/socket.io/socket.io.js"></script>
</head>
<body>
<div id="voiceUnlock">
  <div style="color: #fff; font-size: 20px;">🔊 กดปุ่มเพื่อเปิดใช้งานเสียง</div>
  <button id="unlockVoiceBtn">คลิกเพื่อเปิดเสียง</button>
</div>
<header>
  <h1>Queue System</h1>
  <div class="mode-select">
    <span id="chipOfficerCar" class="chip car active">Officer-Car</span>
    <span id="chipOfficerMotorcycle" class="chip Motorcycle">Officer-Motorcycle</span>
    <span id="chipOfficerTTA" class="chip tta">Officer-TTA</span>
    <span id="chipDisplay" class="chip">Customer</span>
  </div>
  <div class="mode-select">
    <button id="enableDeviceSound" class="chip">🔊 Speaker</button>
    <span id="clock" class="chip">00:00</span>
  </div>
</header>
<main id="officerView">
  <section class="panel">
    <div class="stat">
      <div class="tile"><div class="tiny">Current</div><div id="current" class="big">-</div></div>
      <div class="tile"><div class="tiny">Waiting</div><div id="next" class="big" style="color: #ffcf33;">0</div></div>
      <div class="tile">
        <button id="repeat" style="width:100%; margin-bottom:5px">Repeat last</button>
        <button id="testVoice" style="width:100%">Test voice</button>
      </div>
    </div>
  </section>
  <section class="panel">
    <div class="muted">Call next by counter (press keys 1–9)</div>
    <div id="grid" class="grid9"></div>
  </section>
</main>
<main id="displayView" class="display-wrap" style="display: none;">
  <section class="display-top">
    <div class="display-now">
      <h2>Now Serving</h2>
      <div id="dTicket" class="display-ticket">-</div>
      <div id="dPlate" class="display-plate">-</div>
      <div id="dCounter" style="font-size:32px">Counter -</div>
    </div>
    <div class="recent">
      <h3>Counters Active</h3>
      <div id="recentList" class="recent-list"></div>
    </div>
  </section>
</main>
<script>
const socket = io();
const TYPES = { car: { prefix: 'A', name: 'Car', color: '#1e88e5' }, Motorcycle: { prefix: 'B', name: 'Motorcycle', color: '#43a047' }, tta: { prefix: 'C', name: 'TTA', color: '#fb8c00' } };
let currentRoom = 'car', currentView = 'officer', db = {};

socket.on('update_state', (serverDB) => { db = serverDB; render(); });

function render() {
  if (!db.queueData) return;
  $('#current').textContent = db.activeCalls[Object.keys(db.activeCalls).find(k=>db.activeCalls[k].type===currentRoom)]?.ticket || "-";
  $('#next').textContent = db.queueData[currentRoom].filter(q=>!q.called).length;
  
  // Render 9 Counters
  $('#grid').innerHTML = '';
  for (let i = 1; i <= 9; i++) {
    const btn = document.createElement('button'); btn.className = 'cbtn';
    const r = db.activeCalls[i];
    btn.innerHTML = r ? `<div class="num">${r.ticket}</div><div class="plate">${r.plate}</div><div class="label">Counter ${i}</div>` : `<div class="num">-</div><div class="label">Counter ${i}</div>`;
    btn.onclick = () => socket.emit('call_next', { counter: i, room: currentRoom });
    $('#grid').appendChild(btn);
  }
  
  // Render Customer Active List
  let html = '';
  for (let i = 1; i <= 9; i++) {
    const r = db.activeCalls[i];
    if (r) html += `<div class="card" style="border:1px solid ${TYPES[r.type].color}"><div>${r.ticket}</div><div style="font-size:10px">Counter ${i}</div></div>`;
  }
  $('#recentList').innerHTML = html;
}

const $ = s => document.querySelector(s);
// ... ฟังก์ชันเสริมอื่นๆ คงไว้ตามเดิม (ยกเว้นส่วนที่ลบออก)
document.addEventListener('keydown', e => {
    if(currentView === 'officer' && e.key >= '1' && e.key <= '9') socket.emit('call_next', { counter: parseInt(e.key), room: currentRoom });
});
</script>
</body>
</html>
